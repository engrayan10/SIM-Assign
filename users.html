<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Station SIM/IP Assignment</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <div class="flex-between mb-16">
        <div style="font-size:15px; font-weight:700;">All Users</div>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add User</button>
      </div>

      <div class="card">
        <div id="loadingState" class="loading-state">Loading users...</div>
        <div id="tableWrap" class="table-wrap" style="display:none;">
          <table>
            <thead>
              <tr><th>Payroll No</th><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New User</div>
      <button class="modal-close" onclick="closeAddModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Payroll Number (6 digits)</label>
        <input type="text" class="form-input" id="newPayroll" maxlength="6" inputmode="numeric" placeholder="e.g. 104913">
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="newName">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" id="newRole">
          <option value="STN_ADMIN">Station Admin</option>
          <option value="STN_SCADA">SCADA</option>
          <option value="SUPER_ADMIN">Super Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Initial Password</label>
        <input type="text" class="form-input" id="newPassword" placeholder="At least 6 characters">
        <div class="form-hint">Share this with the user directly. They can't reset it themselves yet — you'll need to set a new one if they forget it.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="saveUserBtn" onclick="saveNewUser()">Add User</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/data.js"></script>
<script>
const user = requireRole('SUPER_ADMIN');
if (user) {
  renderSidebar(user, 'users.html');
  renderTopBar(user, 'Users');
  loadUsers();
}

let allUsers = [];

async function loadUsers() {
  const { data, error } = await fetchAllUsers();
  document.getElementById('loadingState').style.display = 'none';

  if (error) {
    showToast('Error loading users: ' + error.message, 'error');
    return;
  }

  allUsers = data || [];
  document.getElementById('tableWrap').style.display = 'block';
  renderTable();
}

function renderTable() {
  document.getElementById('tableBody').innerHTML = allUsers.map(u => `
    <tr>
      <td><strong>${escapeHtml(u.payroll_no)}</strong></td>
      <td>${escapeHtml(u.name)}</td>
      <td><span class="role-badge role-${u.role}">${formatRole(u.role)}</span></td>
      <td><span class="badge ${u.is_active ? 'badge-green' : 'badge-gray'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="toggleActive('${u.id}', ${!u.is_active})">
          ${u.is_active ? 'Deactivate' : 'Activate'}
        </button>
      </td>
    </tr>
  `).join('');
}

function openAddModal() {
  document.getElementById('newPayroll').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('newRole').value = 'STN_ADMIN';
  document.getElementById('newPassword').value = '';
  document.getElementById('addModal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function saveNewUser() {
  const payrollNo = document.getElementById('newPayroll').value.trim();
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value;
  const password = document.getElementById('newPassword').value;

  if (!/^\d{6}$/.test(payrollNo)) {
    showToast('Payroll number must be exactly 6 digits.', 'warning');
    return;
  }
  if (!name) {
    showToast('Please enter a name.', 'warning');
    return;
  }
  if (!password || password.length < 6) {
    showToast('Password must be at least 6 characters.', 'warning');
    return;
  }

  const btn = document.getElementById('saveUserBtn');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  const { data, error } = await createUserViaFunction({
    payrollNo, name, role, password, requestingUserId: user.id,
  });

  btn.disabled = false;
  btn.textContent = 'Add User';

  if (error) {
    showToast('Error adding user: ' + error.message, 'error', 6000);
    return;
  }

  await writeAuditLog({ user_name: user.name, action: 'USER_CREATED', remarks: `Added user ${name} (${role}), payroll ${payrollNo}` });

  showToast('User added successfully.', 'success');
  closeAddModal();
  loadUsers();
}

async function toggleActive(id, newStatus) {
  const { error } = await toggleUserActive(id, newStatus);
  if (error) {
    showToast('Error updating user: ' + error.message, 'error');
    return;
  }
  showToast(`User ${newStatus ? 'activated' : 'deactivated'}.`, 'success');
  loadUsers();
}
</script>
</body>
</html>
