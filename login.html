<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Station SIM/IP Assignment</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">Station <span>SIM/IP</span> Assignment</div>
    <div class="login-subtitle">Sign in with your payroll number</div>

    <div class="form-group">
      <label class="form-label">Payroll Number</label>
      <input type="text" class="form-input" id="payrollInput" placeholder="6-digit payroll number" maxlength="6" inputmode="numeric">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="Your password" onkeydown="if(event.key==='Enter') handleSignIn()">
    </div>

    <button class="btn btn-primary w-full" style="justify-content:center; padding:11px;" onclick="handleSignIn()">
      Sign In
    </button>

    <div class="text-sm text-gray text-center" style="margin-top:18px;">
      Don't have an account? Ask your Super Admin to create one for you.
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script>
async function handleSignIn() {
  const payrollNo = document.getElementById('payrollInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if (!/^\d{6}$/.test(payrollNo)) {
    showToast('Payroll number must be exactly 6 digits.', 'warning');
    return;
  }
  if (!password) {
    showToast('Please enter your password.', 'warning');
    return;
  }

  const fakeEmail = `${payrollNo}@${PAYROLL_EMAIL_DOMAIN}`;

  const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
    email: fakeEmail,
    password: password,
  });

  if (authError) {
    showToast('Invalid payroll number or password.', 'error');
    return;
  }

  const { data: profile, error: profileError } = await supabaseClient
    .from('app_users')
    .select('*')
    .eq('id', authData.user.id)
    .single();

  if (profileError || !profile) {
    showToast('Account exists but has no profile. Contact your Super Admin.', 'error', 6000);
    await supabaseClient.auth.signOut();
    return;
  }

  if (!profile.is_active) {
    showToast('Your account has been deactivated. Contact your Super Admin.', 'error', 6000);
    await supabaseClient.auth.signOut();
    return;
  }

  saveSession(profile);
  window.location.href = 'redirect.html';
}
</script>
</body>
</html>
